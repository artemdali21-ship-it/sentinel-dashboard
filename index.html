<style>
:root {

.pulse-score{font-size:56px;font-weight:800;line-height:1;margin:8px 0}

.flag-text{font-size:13px;color:var(--text-1);line-height:1.4}

.ring-pct{font-size:10px;color:var(--text-2);font-family:var(--mono)}

.proj-status{font-size:10px;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{font-size:11px;color:var(--text-2);font-family:var(--mono)}
.proj-pct{font-size:14px;font-weight:700;font-family:var(--mono);min-width:40px;text-align:right}

.agent-id{font-size:13px;font-weight:600;font-family:var(--mono)}

.agent-detail{font-size:11px;color:var(--text-2);line-height:1.5}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--bg-3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}

.nav-btn{background:none;border:none;color:var(--text-2);font-size:10px;font-family:var(--mono);padding:8px 20px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s}

.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

      e(screens[screen])),
    e("div",{className:"nav"},
      names.map((n,i)=>e("button",{key:i,className:"nav-btn"+(screen===i?" active":""),onClick:()=>setScreen(i)},n)))
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
